<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>VS 게임</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/question.css">
</head>

<body class="question-body">
  <main class="question-wrap">

    <!-- 질문 -->
    <h2 class="q-title"></h2>

    <!-- 선택 영역 -->
    <div class="q-content">

      <!-- 왼쪽 -->
      <div class="choice left">
        <img class="character" />
        <p class="text"></p>

        <div class="select-box">
          <div class="check"></div>
        </div>
      </div>

      <!-- VS -->
      <div class="vs">VS</div>

      <!-- 오른쪽 -->
      <div class="choice right">
        <img class="character" />
        <p class="text"></p>

        <div class="select-box">
          <div class="check"></div>
        </div>
      </div>

    </div>

  </main>

  <script src="js/question.js"></script>
</body>
</html>
