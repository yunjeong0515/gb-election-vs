<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VS 질문</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/question.css">
</head>
<body class="question-body">

  <main class="question-wrap">
    <!-- 질문 -->
    <div class="question-title">
      <img id="questionImg" src="images/question/q_01.png" alt="">
    </div>

    <div class="vs-container">

      <!-- 왼쪽 -->
      <div class="choice-wrap left" data-choice="left">
        <div class="character-wrap">
          <img src="images/question/juisoon.png" alt="쥐순" />
        </div>
        <div class="text">
          <img id="leftImg" src="images/question/q_01_a.png" alt="">
        </div>
        <button class="checkbox">
          <img class="check-icon" src="images/question/check_icon.png" alt="check">
          <img src="images/question/left_checkbox.png" alt="checkbox">
        </button>
      </div>
      <!-- VS -->
      <div class="vs-wrap">
        <div class="vs-icon">
          <img src="images/question/vs.png" alt="vs">
        </div>
      </div>
      <!-- 오른쪽 -->
      <div class="choice-wrap right" data-choice="right">
        <div class="character-wrap">
          <img src="images/question/ttora.png" alt="또라" />
        </div>
        <div class="text">
          <img id="rightImg" src="images/question/q_01_b.png" alt="">
        </div>
        <button class="checkbox">
          <img class="check-icon" src="images/question/check_icon.png" alt="check">
          <img src="images/question/left_checkbox.png" alt="checkbox">
        </button>
      </div>
    </div>

    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/question.js"></script>
</body>
</html>
