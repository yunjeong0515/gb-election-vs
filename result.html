  <script>

    const storedAnswers = localStorage.getItem('answers');
    const answers = storedAnswers ? JSON.parse(storedAnswers) : [];


    let aCount = answers.filter(item => item.answer === 'left').length;
    let bCount = answers.filter(item => item.answer === 'right').length;


    const finalResultText = document.getElementById('finalResultText');
    const characterText = document.getElementById('characterText');
    const characterImg = document.getElementById('characterImg');

    if(aCount > bCount){
      finalResultText.innerHTML = `<img src="images/result/result_a.png" alt="A 유형">`;

      characterText.src = 'images/result/juisoon_text.svg';
      characterImg.src = 'images/result/juisoon.svg';

    } else {
      finalResultText.innerHTML = `<img src="images/result/result_b.png" alt="B 유형">`;

      characterText.src = 'images/result/ttora_text.svg';
      characterImg.src = 'images/result/ttora.svg';
    }

    const detailMessages = {
      1: { left: '탕수육은 무조건 찍먹파!', right: '탕수육은 무조건 부먹파!' },
      2: { left: '치킨은 바삭한 후라이드지!', right: '치킨은 달달한 양념이지!' },
      3: { left: '비.. 조금 있으면 그치지 않을까..?', right: '그렇게 사게된 우산만 어느새 5개째..' },
      4: { left: '여행가면 시간 단위로 계획 세우기', right: '오늘 가고 싶은 곳은 오늘의 나에게!' },
      5: { left: '문자 안보네.. 신경이 쓰여...', right: '문자는.. 내가 더 안 봐 사실' }
    };

    const detailText = document.getElementById('detailText');
    let detailHTML = '';

    answers.forEach(item => {
      detailHTML += `<p>-  ${detailMessages[item.question][item.answer]}</p>`;
    });

    detailText.innerHTML = detailHTML;

    window.addEventListener('load', () => {
      document.body.classList.add('show');
    });

    setTimeout(() => {
      window.location.href = 'complete.html';
    }, 6000);
  </script>
